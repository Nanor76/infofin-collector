{% extends "layout.html" %}
{% block title %}Résultats — InfoFin{% endblock %}
{% block content %}
<section class="panel">
  <div class="results-header">
    <h1>Résultats</h1>
    <div class="export-actions">
      <a class="btn-secondary" href="/api/searches/{{ job_id }}/export?format=csv">Export CSV</a>
      <a class="btn-secondary" href="/api/searches/{{ job_id }}/export?format=json">Export JSON</a>
    </div>
  </div>
  <div
    id="job-status"
    hx-get="/partials/searches/{{ job_id }}/status"
    hx-trigger="load, every 2s"
    hx-swap="innerHTML"
  >
    {% include "partials/job_status.html" %}
  </div>
</section>

<section class="panel" id="results-panel">
  <form
    id="results-filters"
    class="filters-form"
    hx-get="/partials/searches/{{ job_id }}/results"
    hx-target="#results-table"
    hx-trigger="change, submit"
    hx-include="#results-filters"
  >
    <div class="field-row">
      <div class="field">
        <label for="filter_document_type">Type</label>
        <select id="filter_document_type" name="document_type">
          <option value="">Tous</option>
          {% for value, label in document_types %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="filter_market">Marché</label>
        <input type="text" id="filter_market" name="market" placeholder="Euronext Paris">
      </div>
      <div class="field">
        <label for="filter_source">Source</label>
        <input type="text" id="filter_source" name="source">
      </div>
      <div class="field">
        <label for="filter_q">Texte</label>
        <input type="text" id="filter_q" name="q">
      </div>
      <div class="field">
        <label for="filter_isin">ISIN</label>
        <input type="text" id="filter_isin" name="issuer_isin">
      </div>
    </div>
  </form>
  <div
    id="results-table"
    hx-get="/partials/searches/{{ job_id }}/results"
    hx-trigger="load, every 2s"
    hx-swap="innerHTML"
  >
    {% if show_initial_results %}
    {% include "partials/results_table.html" %}
    {% endif %}
  </div>
</section>
{% endblock %}
