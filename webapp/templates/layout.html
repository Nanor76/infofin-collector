<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}InfoFin — Recherche de documents{% endblock %}</title>
  
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Style -->
  <link rel="stylesheet" href="/static/app.css?v=2.2">
  
  <!-- HTMX & Lucide Icons -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/static/app.js?v=2.2" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-container">
      <a href="/" class="brand">
        <i data-lucide="trending-up" class="brand-icon"></i>
        <span>InfoFin</span>
      </a>
      <span class="tagline">Collecteur & Indexateur de Documents Financiers</span>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 InfoFin. Tous droits réservés. Interface modernisée pour une expérience premium.</p>
    </div>
  </footer>
</body>
</html>
