<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}InfoFin — Recherche de documents{% endblock %}</title>
  
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Style -->
  <link rel="stylesheet" href="/static/app.css?v=2.3">
  
  <!-- HTMX & Lucide Icons -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/static/app.js?v=2.4" defer></script>
</head>
<body>
  <header class="site-header" data-testid="layout-header">
    <div class="container header-container">
      <a href="/" class="brand" data-testid="layout-home-link">
        <i data-lucide="trending-up" class="brand-icon"></i>
        <span>InfoFin</span>
      </a>
      <span class="tagline">Collecteur & Indexateur de Documents Financiers</span>
      {% if beta_user %}
      <div class="beta-account" data-testid="layout-beta-account">
        <span data-testid="layout-beta-user">{{ beta_user.display_name }}</span>
        <form action="/logout" method="post" data-testid="layout-logout-form">
          <button type="submit" class="btn-link" data-testid="layout-logout-button">Déconnexion</button>
        </form>
      </div>
      {% endif %}
    </div>
  </header>
  <main class="container" data-testid="layout-main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer" data-testid="layout-footer">
    <div class="container">
      <p>&copy; 2026 InfoFin — Bêta privée. Aucun conseil en investissement.</p>
      <nav class="legal-links" aria-label="Informations légales">
        <a href="/legal/mentions" data-testid="layout-legal-mentions-link">Mentions légales</a>
        <a href="/legal/privacy" data-testid="layout-legal-privacy-link">Confidentialité</a>
      </nav>
    </div>
  </footer>
</body>
</html>
